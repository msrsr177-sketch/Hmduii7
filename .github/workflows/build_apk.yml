name: Build Professional Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Web Dependencies
        run: |
          npm install
          npm run build --if-present

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Initialize & Sync Capacitor
        run: |
          # تنصيب أدوات الأيقونات مع المكتبات الأساسية
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          mkdir -p dist
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # --- إضافة أوامر الأيقونات والشاشة الخارجية ---
          # هذا الأمر يقرأ الملفات من مجلد assets اللي بالجذر (Root)
          npx @capacitor/assets generate --android --assetPath assets
          
          npx cap sync android

      - name: Fix Android Build Issues (Magic Fixes)
        run: |
          if [ -d "android" ]; then
            cd android
            rm -f gradle/wrapper/gradle-wrapper.jar
            curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            echo "android.useAndroidX=true" > gradle.properties
            echo "android.enableJetifier=true" >> gradle.properties
            sed -i '/dependencies {/a \    modules { module("org.jetbrains.kotlin:kotlin-stdlib-jdk7") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") } }' app/build.gradle
            sed -i '/dependencies {/a \    modules { module("org.jetbrains.kotlin:kotlin-stdlib-jdk8") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") } }' app/build.gradle
          fi

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
