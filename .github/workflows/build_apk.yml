name: Build Professional Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من تبويب Actions

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Latest LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22' # متوافق مع أحدث إصدارات Capacitor 6+

      - name: Install Web Dependencies
        run: |
          npm install
          npm run build --if-present

      - name: Setup Java (Android Standard)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # الإصدار المطلوب لمشاريع الأندرويد الحديثة

      - name: Initialize & Sync Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # إنشاء مجلد dist إذا لم يوجد لمنع فشل المزامنة
          mkdir -p dist
          # إضافة منصة أندرويد ومزامنتها
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Fix Android Build Issues (Magic Fixes)
        run: |
          if [ -d "android" ]; then
            cd android
            # 1. حل مشكلة الـ Gradle Wrapper التالف (تحميل نسخة نظيفة)
            rm -f gradle/wrapper/gradle-wrapper.jar
            curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            
            # 2. تفعيل AndroidX و Jetifier لضمان توافق المكتبات القديمة
            echo "android.useAndroidX=true" > gradle.properties
            echo "android.enableJetifier=true" >> gradle.properties
            
            # 3. حل تضارب مكتبات Kotlin (تعديل ملف build.gradle)
            sed -i '/dependencies {/a \    modules { module("org.jetbrains.kotlin:kotlin-stdlib-jdk7") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") } }' app/build.gradle
            sed -i '/dependencies {/a \    modules { module("org.jetbrains.kotlin:kotlin-stdlib-jdk8") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") } }' app/build.gradle
          fi

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7 # يحفظ الملف لمدة 7 أيام لتوفير المساحة
          
