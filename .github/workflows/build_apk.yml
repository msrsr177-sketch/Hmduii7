name: Fixed AI Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web
        run: |
          npm install
          # نسخ الملف للخارج إذا كان مفقوداً
          [ -f "src/index.html" ] && cp src/index.html . || true
          npm run build

      - name: Capacitor Force Setup
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # حذف المجلد القديم لضمان بداية نظيفة
          rm -rf android 
          # إنشاء ملف الإعدادات بهوية التطبيق تلقائياً
          npx cap init "MyAIApp" "com.msrsr.ai" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Build Final APK
        run: |
          cd android
          echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Successful-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
