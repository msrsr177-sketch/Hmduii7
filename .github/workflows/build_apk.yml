name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Web
        run: |
          npm install
          npm run build --if-present

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # تم التغيير لـ 21 ليطابق متطلبات مشروعك

      - name: Initialize Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p dist
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Force Fix Dependencies
        run: |
          if [ -d "android" ]; then
            echo "android.useAndroidX=true" > android/gradle.properties
            echo "android.enableJetifier=true" >> android/gradle.properties
            
            # حل تضارب مكتبات Kotlin
            sed -i '/dependencies {/a \    modules { module("org.jetbrains.kotlin:kotlin-stdlib-jdk7") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") } }' android/app/build.gradle
            sed -i '/dependencies {/a \    modules { module("org.jetbrains.kotlin:kotlin-stdlib-jdk8") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") } }' android/app/build.gradle
          fi

      - name: Build APK
        run: |
          cd android
          # إصلاح ملف الـ Gradle المعطوب
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
