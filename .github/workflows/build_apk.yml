name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix File Structure & Build Web
        run: |
          # إذا كان index.html داخل src، نقوم بنسخه للخارج ليجده Vite
          if [ -f "src/index.html" ]; then
            cp src/index.html .
          fi
          npm install
          npm run build --if-present

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Initialize Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # التأكد من مجلد المخرجات (Vite يستخدم dist غالباً)
          [ -d "dist" ] || mkdir dist
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init "MyApp" "com.app.ai" --web-dir dist
          fi
          npx cap add android || true
          npx cap sync android

      - name: Ultimate Android Fix
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "kotlin.stdlib.default.dependency=false" >> gradle.properties

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-App-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
