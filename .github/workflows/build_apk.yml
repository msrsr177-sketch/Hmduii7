name: Build Flutter Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Fix and Re-initialize Android Project
        run: |
          # تنظيف أي مخلفات قديمة
          flutter clean
          # إعادة توليد ملفات الأندرويد الناقصة أو المتضررة تلقائياً
          flutter create . --platforms android
          # تحميل المكتبات من جديد
          flutter pub get

      - name: Build Android APK
        run: |
          # بناء APK نسخة Debug مع تخطي فحص الـ Gradle القديم
          flutter build apk --debug --target-platform android-arm64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flutter-App-Build-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
