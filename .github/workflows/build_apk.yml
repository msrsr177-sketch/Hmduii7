name: Ultimate Clean Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web
        run: |
          npm install
          npm run build

      - name: Fresh Android Install
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # حذف مجلد الأندرويد القديم إذا وجد لضمان عدم التكرار
          rm -rf android 
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin & Build
        run: |
          cd android
          # إجبار النظام على حل التضارب تلقائياً
          echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-App-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
