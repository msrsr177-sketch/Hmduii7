name: Build Flutter Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Fix and Re-initialize Android Project
        run: |
          flutter create . --platforms android
          flutter pub get

      - name: Auto-Fix Dart Code (Colors)
        run: |
          # هذا الأمر يبحث بملف main.dart ويبدل الألوان اللي تسبب خطأ
          sed -i 's/Colors.roseAccent/Colors.pinkAccent/g' lib/main.dart
          sed -i 's/Colors.rose/Colors.pink/g' lib/main.dart
          sed -i 's/Colors.emeraldAccent/Colors.tealAccent/g' lib/main.dart

      - name: Build Android APK
        run: |
          flutter build apk --debug --target-platform android-arm64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flutter-App-Build-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
