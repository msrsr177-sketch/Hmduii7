name: Final Success Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web
        run: |
          npm install
          # أمر احتياطي لنقل الملف إذا وجد داخل src
          [ -f "src/index.html" ] && cp src/index.html . || true
          npm run build

      - name: Capacitor Android Sync
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # حذف أي مخلفات قديمة للأندرويد لضمان عدم تكرار الملفات
          rm -rf android 
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin & Build APK
        run: |
          cd android
          # حل مشكلة Duplicate class found in modules نهائياً
          echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: My-AI-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
