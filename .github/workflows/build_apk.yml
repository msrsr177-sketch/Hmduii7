name: Build Flutter Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Fix and Re-initialize Project
        run: |
          # تنظيف المشروع
          flutter clean
          
          # إضافة المكتبات التي ظهر فيها نقص (تلقائياً)
          flutter pub add shared_preferences
          flutter pub add firebase_core
          
          # إعادة بناء ملفات الأندرويد والـ Gradle لتجنب "Unsupported Gradle"
          flutter create . --platforms android
          
          # تحميل كافة المكتبات المسجلة
          flutter pub get

      - name: Auto-Fix Dart Code (Colors)
        run: |
          # استبدال الألوان غير المعرفة بألوان قياسية داخل ملف الـ main.dart
          if [ -f lib/main.dart ]; then
            sed -i 's/Colors.roseAccent/Colors.pinkAccent/g' lib/main.dart
            sed -i 's/Colors.rose/Colors.pink/g' lib/main.dart
            sed -i 's/Colors.emeraldAccent/Colors.tealAccent/g' lib/main.dart
            echo "Dart colors fixed!"
          fi

      - name: Build Android APK
        run: |
          # بناء التطبيق بصيغة APK (نسخة Debug)
          # ملاحظة: تأكد من وجود ملف google-services.json في android/app/ لنجاح هذه الخطوة
          flutter build apk --debug --target-platform android-arm64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: New-Phone-App-Build-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
