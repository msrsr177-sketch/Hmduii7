name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22' # تم التحديث لحل مشكلة Capacitor CLI

      - name: Build Web
        run: |
          npm install
          npm run build --if-present

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # تم التغيير لـ 17 لضمان استقرار بناء الأندرويد

      - name: Initialize Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # التأكد من وجود مجلد dist لتجنب أخطاء المزامنة
          mkdir -p dist
          
          # إضافة منصة أندرويد إذا لم تكن موجودة ومزامنة الملفات مباشرة
          # تم إلغاء npx cap init لتجنب مشكلة وجود ملف capacitor.config.ts
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Force Fix Dependencies
        run: |
          # التأكد من وجود المجلد قبل التعديل عليه
          if [ -d "android" ]; then
            echo "android.useAndroidX=true" > android/gradle.properties
            echo "android.enableJetifier=true" >> android/gradle.properties
            
            # حل مشكلة تكرار مكتبات Kotlin stdlib
            sed -i '/dependencies {/a \    modules { module("org.jetbrains.kotlin:kotlin-stdlib-jdk7") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") } }' android/app/build.gradle
            sed -i '/dependencies {/a \    modules { module("org.jetbrains.kotlin:kotlin-stdlib-jdk8") { replacedBy("org.jetbrains.kotlin:kotlin-stdlib") } }' android/app/build.gradle
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
